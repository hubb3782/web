<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欢迎</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a14;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }

  /* 星空背景 */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* 光晕 */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
  }
  .glow-1 {
    top: -200px; left: -200px;
    background: #6366f1;
    animation: float1 8s ease-in-out infinite;
  }
  .glow-2 {
    bottom: -200px; right: -200px;
    background: #06b6d4;
    animation: float2 10s ease-in-out infinite;
  }
  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(60px, 40px); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-60px, -30px); }
  }

  /* 主体 */
  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 48px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    max-width: 480px;
    width: 90%;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 24px;
    box-shadow: 0 0 40px rgba(99,102,241,0.3);
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .subtitle {
    color: #94a3b8;
    font-size: 15px;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, #6366f1, #06b6d4);
    margin: 0 auto 32px;
    border-radius: 1px;
  }

  .info {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .info-item {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #cbd5e1;
    font-size: 14px;
  }
  .info-item .icon {
    width: 18px;
    text-align: center;
    opacity: 0.6;
  }

  .btn {
    display: inline-block;
    margin-top: 36px;
    padding: 12px 36px;
    border-radius: 50px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    color: white;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 1px;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(99,102,241,0.3);
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(99,102,241,0.5);
  }

  .footer {
    margin-top: 40px;
    color: #475569;
    font-size: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="avatar">🚀</div>
  <h1>欢 迎 来 访</h1>
  <p class="subtitle">Welcome to My Space</p>
  <div class="divider"></div>
  <div class="info">
    <div class="info-item">
      <span class="icon">📍</span>
      <span>探索无限可能</span>
    </div>
    <div class="info-item">
      <span class="icon">💡</span>
      <span>创意 · 技术 · 分享</span>
    </div>
  </div>
  <a href="#" class="btn">开 始 探 索</a>
  <div class="footer">STAY CURIOUS ✦ KEEP BUILDING</div>
</div>

<script>
// 生成星空
const container = document.getElementById('stars');
for (let i = 0; i < 100; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = Math.random() * 2 + 1;
  star.style.width = size + 'px';
  star.style.height = size + 'px';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
  star.style.setProperty('--delay', Math.random() * 4 + 's');
  container.appendChild(star);
}
</script>

</body>
</html>
